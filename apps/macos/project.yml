name: Opengram
options:
  bundleIdPrefix: sh.opengram
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: ""
    Release:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Developer ID Application"
      DEVELOPMENT_TEAM: ""

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Opengram:
    type: application
    platform: macOS
    sources:
      - path: Opengram
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.opengram.macos
        PRODUCT_NAME: Opengram
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Opengram/Info.plist
        CODE_SIGN_ENTITLEMENTS: Opengram/Opengram.entitlements
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
